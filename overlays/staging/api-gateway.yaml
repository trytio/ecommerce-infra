# Staging: 2 replicas, moderate resources
groups:
  - name: gateway
    count: 2
    tasks:
      - name: echo
        image: "hashicorp/http-echo:latest"
        command: ["-text=api-gateway-ok", "-listen=:8080"]
        ports:
          - label: http
            container: 8080
            host: 0
        resources:
          cpu: 200
          memory: 128
        health_check:
          type: http
          path: /
          port_label: http
          interval_secs: 10
          timeout_secs: 5
          unhealthy_threshold: 3
          healthy_threshold: 2
          grace_period_secs: 15
        env:
          SERVICE_NAME: "api-gateway"
          LOG_LEVEL: "info"
          RATE_LIMIT: "5000"
        labels:
          tier: gateway
          tag.api: "true"
          version: "1.0.0"
          environment: "staging"
