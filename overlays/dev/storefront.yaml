# Dev: single replica, minimal resources, debug logging
groups:
  - name: web
    count: 1
    tasks:
      - name: nginx
        image: "nginx:alpine"
        ports:
          - label: http
            container: 80
            host: 0
        resources:
          cpu: 100
          memory: 64
        health_check:
          type: http
          path: /
          port_label: http
          interval_secs: 10
          timeout_secs: 5
          unhealthy_threshold: 3
          healthy_threshold: 2
          grace_period_secs: 15
        env:
          NGINX_PORT: "80"
          DEBUG: "true"
          LOG_LEVEL: "debug"
        labels:
          tier: frontend
          tag.storefront: "true"
          version: "1.0.0"
          environment: "dev"
