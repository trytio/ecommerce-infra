# Prod: 3+ replicas, autoscaling, production TTL
groups:
  - name: cart
    count: 3
    scaling:
      min: 2
      max: 6
      metric: cpu
      target: 70
      cooldown: 60
    tasks:
      - name: cart-api
        image: "hashicorp/http-echo:latest"
        command: ["-text=cart-service-ok", "-listen=:8082"]
        ports:
          - label: http
            container: 8082
            host: 0
        resources:
          cpu: 300
          memory: 256
        health_check:
          type: http
          path: /
          port_label: http
          interval_secs: 10
          timeout_secs: 5
          unhealthy_threshold: 3
          healthy_threshold: 2
          grace_period_secs: 15
        env:
          REDIS_HOST: "cart-redis"
          REDIS_PORT: "6379"
          CART_TTL_HOURS: "72"
          LOG_LEVEL: "warn"
        labels:
          tier: backend
          tag.cart: "true"
          version: "1.0.0"
          environment: "prod"
