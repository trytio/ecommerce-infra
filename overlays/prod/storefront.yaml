# Prod: 3+ replicas, autoscaling, full resources
groups:
  - name: web
    count: 3
    scaling:
      min: 2
      max: 10
      metric: cpu
      target: 70
      cooldown: 60
    tasks:
      - name: nginx
        image: "nginx:alpine"
        ports:
          - label: http
            container: 80
            host: 0
        resources:
          cpu: 500
          memory: 256
        health_check:
          type: http
          path: /
          port_label: http
          interval_secs: 10
          timeout_secs: 5
          unhealthy_threshold: 3
          healthy_threshold: 2
          grace_period_secs: 15
        env:
          NGINX_PORT: "80"
          LOG_LEVEL: "warn"
        labels:
          tier: frontend
          tag.storefront: "true"
          version: "1.0.0"
          environment: "prod"
