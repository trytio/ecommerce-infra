# Storefront — Public-facing web UI (Next.js / React)
# Serves product pages, cart, and checkout flow.

name: storefront
job_type: service
namespace: default

update:
  max_parallel: 1
  stagger_secs: 30
  health_deadline_secs: 120
  on_failure: rollback
  auto_revert: true
  canary: 0

groups:
  - name: web
    count: 2
    strategy: spread

    restart:
      mode: on-failure
      max_attempts: 5
      delay_secs: 5

    tasks:
      - name: nginx
        image: "nginx:alpine"
        ports:
          - label: http
            container: 80
            host: 0
        resources:
          cpu: 200
          memory: 128
        health_check:
          type: http
          path: /
          port_label: http
          interval_secs: 10
          timeout_secs: 5
          unhealthy_threshold: 3
          healthy_threshold: 2
          grace_period_secs: 15
        env:
          NGINX_PORT: "80"
        labels:
          tier: frontend
          tag.storefront: "true"
          version: "1.0.0"
